source: geo
enabled: true
database: gds
data_type_filter: rnaseq
query_template: |
  ("{organism}"[orgn] OR "{taxonomy_id}"[orgn]) AND
  ("expression profiling by high throughput sequencing"[gdstype] OR
   "RNA-seq"[description] OR "transcriptome"[description]) AND
  gse[entry_type]
retmax: 100
field_mapping:
  accession: Accession
  title: title
  organism: taxon
  summary: summary
  platform: GPL
