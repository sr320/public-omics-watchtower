source: geo
enabled: true
database: gds
data_type_filter: rnaseq
query_template: |
  ("{organism}"[Organism] OR "{taxonomy_id}"[Organism]) AND
  ("expression profiling by high throughput sequencing"[DataSet Type] OR
   "RNA-seq"[Description] OR "transcriptome"[Description])
retmax: 100
field_mapping:
  accession: Accession
  title: title
  organism: taxon
  summary: summary
  platform: GPL
