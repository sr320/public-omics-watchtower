source: sra
enabled: true
database: sra
data_type_filter: rnaseq
query_template: |
  ("{organism}"[Organism] OR "{taxonomy_id}"[Organism]) AND
  ("RNA-seq"[Strategy] OR "RNA-Seq"[Strategy] OR "transcriptome"[Title])
retmax: 100
field_mapping:
  accession: acc
  title: title
  organism: organism
  summary: summary
  platform: platform
